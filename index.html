<style>
  :root{
    --bg:#0b0c0e; --s1:#111215; --s2:#18191d; --b1:rgba(255,255,255,.06); --b2:rgba(255,255,255,.12);
    --text:#f3f3f4; --t2:#b5b5bc; --t3:#70707a; --acc:#e8f542; --adim:rgba(232,245,66,.08);
    --a:#0f172a; --b:#052e16; --c:#1a0533; --d:#2a1406; --e:#1a0c0c; --f:#0c1a0c;
    --fd:'Barlow Condensed',sans-serif; --fs:'Barlow',sans-serif; --fm:'JetBrains Mono',monospace;
    --r:10px; --r2:14px; --r3:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--fs);font-size:15px;line-height:1.45}
  .header{position:sticky;top:0;z-index:10;background:#0d0e12;border-bottom:2px solid var(--acc);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .logo{font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:.05em}
  .logo span:last-child{color:var(--acc)}
  .subhead{font-family:var(--fm);font-size:10px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;text-align:right}
  .nav{position:sticky;top:48px;z-index:9;display:flex;gap:2px;overflow:auto;background:var(--s1);border-bottom:1px solid var(--b1);padding:0 6px}
  .nav button{background:none;border:0;color:var(--t3);padding:12px 14px;font:700 13px var(--fd);letter-spacing:.06em;text-transform:uppercase;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
  .nav button.active{color:var(--text);border-color:var(--acc)}
  .main{max-width:780px;margin:0 auto;padding:18px 14px 96px}
  .section{display:none}.section.active{display:block}
  .hero,.card,.exercise,.note,.stats,.tech,.meso{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2)}
  .hero{padding:24px 20px;margin-bottom:14px}
  .eyebrow{font-family:var(--fm);font-size:10px;letter-spacing:.18em;color:var(--acc);text-transform:uppercase;margin-bottom:10px}
  .title{font-family:var(--fd);font-size:38px;font-weight:800;line-height:1;margin-bottom:6px}
  .subtitle{font-size:14px;color:var(--t2);font-style:italic;margin-bottom:16px}
  .tags,.weekrow,.statsrow{display:flex;gap:8px;flex-wrap:wrap}
  .tag{font-family:var(--fm);font-size:10px;letter-spacing:.08em;padding:4px 10px;border-radius:999px;border:1px solid var(--b2);color:var(--t2)}
  .week{flex:1 1 160px;padding:14px 12px;border-radius:var(--r2);cursor:pointer;border:1px solid var(--b1);text-align:left}
  .week.a{background:var(--a)}.week.b{background:var(--b)}.week.c{background:var(--c)}.week.d{background:var(--d)}.week.e{background:var(--e)}.week.f{background:var(--f)}
  .wk1{font-family:var(--fm);font-size:10px;letter-spacing:.14em;color:var(--t2);margin-bottom:4px}
  .wk2{font-family:var(--fd);font-size:22px;font-weight:700}
  .wk3{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.45}
  .note{padding:12px 14px;background:var(--adim);border-color:rgba(232,245,66,.16);font-size:12px;color:var(--t2);line-height:1.65}
  .sectionhead{border-radius:var(--r2);padding:20px 18px 16px;margin-bottom:12px;position:relative;overflow:hidden}
  .sectionhead::after{content:attr(data-id);position:absolute;right:-8px;top:-12px;font-family:var(--fd);font-size:100px;font-weight:900;opacity:.05}
  .sa{background:var(--a);border:1px solid rgba(96,165,250,.22)}.sb{background:var(--b);border:1px solid rgba(74,222,128,.22)}.sc{background:var(--c);border:1px solid rgba(192,132,252,.22)}.sd{background:var(--d);border:1px solid rgba(251,146,60,.22)}.se{background:var(--e);border:1px solid rgba(244,63,94,.22)}.sf{background:var(--f);border:1px solid rgba(74,222,128,.22)}
  .shey{font-family:var(--fm);font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px}
  .sht{font-family:var(--fd);font-size:28px;font-weight:800;line-height:1.05;margin-bottom:6px}
  .shr{font-size:12px;color:var(--t2)}
  .sessionnote{background:var(--s2);border:1px solid var(--b1);border-left:3px solid var(--acc);border-radius:0 var(--r) var(--r) 0;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--t2);line-height:1.65}

  .vol-badge{display:inline-flex;align-items:center;gap:5px;background:var(--adim);border:1px solid rgba(232,245,66,.2);border-radius:999px;padding:3px 10px;font-family:var(--fm);font-size:10px;color:var(--acc);margin-top:8px}
  .elist{display:flex;flex-direction:column;gap:10px}
  .exercise{overflow:hidden}
  .ehead{display:flex;align-items:center;gap:10px;padding:13px 14px 0}
  .enum{font-family:var(--fm);font-size:11px;color:var(--t3);min-width:20px}
  .ename{font-size:15px;font-weight:600;line-height:1.35;flex:1}
  .pill{font-family:var(--fm);font-size:9px;letter-spacing:.08em;padding:3px 8px;border-radius:999px;text-transform:uppercase}
  .cv{background:rgba(255,255,255,.08);color:#c7c7cd}.bo{background:rgba(34,197,94,.18);color:#86efac}.cluster{background:rgba(96,165,250,.18);color:#93c5fd}.mr{background:rgba(168,85,247,.18);color:#c4b5fd}.rp{background:rgba(244,63,94,.18);color:#fda4af}.myoreps{background:rgba(232,245,66,.18);color:#e8f542}
  .tech-mul{font-family:var(--fm);font-size:9px;color:var(--acc);background:rgba(232,245,66,.08);border:1px solid rgba(232,245,66,.18);padding:2px 6px;border-radius:5px}
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin:10px 14px 0;background:var(--b1);border-radius:var(--r);overflow:hidden}
  .metric{background:var(--s2);padding:8px 10px}
  .ml{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
  .mv{font-family:var(--fm);font-size:12px;color:var(--text);line-height:1.35}
  .how{margin:10px 14px 0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 11px}
  .howt{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:5px}
  .howb{font-size:12px;color:var(--t2);line-height:1.55}
  .obs{padding:10px 14px 0;font-size:12px;color:var(--t2);line-height:1.6;font-style:italic}
  .compareup{color:#86efac;font-weight:700}.comparedown{color:#fda4af;font-weight:700}.compareeq{color:#fde68a;font-weight:700}
  .log{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 14px 14px}
  .field{display:flex;flex-direction:column;gap:5px}
  .wide{grid-column:1/-1}
  label{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
  input,textarea,select{width:100%;background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:10px;padding:10px 11px;font:500 14px var(--fs);outline:none}
  input:focus,textarea:focus{border-color:rgba(232,245,66,.35);box-shadow:0 0 0 3px rgba(232,245,66,.05)}
  textarea{min-height:82px;resize:vertical}
  .history{border-top:1px solid var(--b1);padding:10px 14px 13px}
  .ht{font-family:var(--fm);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
  .hi{font-size:12px;color:var(--t2);line-height:1.5;padding:6px 0;border-top:1px dashed rgba(255,255,255,.06)}
  .hi:first-child{border-top:0;padding-top:0}
  .footer{position:fixed;left:0;right:0;bottom:0;display:flex;gap:8px;padding:10px 12px;background:linear-gradient(to top,#0b0c0e 78%,rgba(11,12,14,.72));backdrop-filter:blur(10px);border-top:1px solid var(--b1)}
  .btn{flex:1;background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:12px;padding:12px 10px;font:700 12px var(--fd);letter-spacing:.04em;text-transform:uppercase;cursor:pointer}
  .btn.primary{background:var(--acc);color:#0b0c0e;border-color:transparent}
  .stats,.tech,.meso{padding:14px}
  .stitle{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
  .statsrow{margin-bottom:12px}
  .stat{flex:1;padding:12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2)}
  .snum{font-family:var(--fd);font-size:28px;font-weight:800;line-height:1}
  .slab{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-top:4px}
  .vr{display:grid;grid-template-columns:1fr auto;gap:8px;padding:7px 0;border-top:1px dashed rgba(255,255,255,.06)}
  .vr:first-child{border-top:0;padding-top:0}
  .vnum{font-family:var(--fm);font-size:12px;color:var(--acc)}
  .techcard{cursor:pointer;transition:.18s}.techcard:hover{border-color:var(--b2)}
  .techmore{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed rgba(255,255,255,.08)}
  .techcard.open .techmore{display:block}
  .techtip{font-family:var(--fm);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);margin-top:10px}
  .techname{display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:700;font-size:14px;margin-bottom:8px}
  .techdesc{font-size:13px;color:var(--t2);line-height:1.65}
  .checkrow{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:10px 11px;min-height:44px}
  .checkrow input[type="checkbox"]{width:18px;height:18px;accent-color:#e8f542;cursor:pointer}
  .checklabel{font-family:var(--fm);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--t2)}
  .setsgrid{display:flex;flex-direction:column;gap:10px;padding:12px 14px 0}
  .setcard{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}
  .setcard.done{border-color:rgba(134,239,172,.22);background:rgba(134,239,172,.04)}
  .sethead{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:8px}
  .setfields{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .setcompare{margin-top:8px;font-size:11px;line-height:1.5;color:var(--t2)}
  .setcheck{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px dashed rgba(255,255,255,.08)}
  .setcheck input[type="checkbox"]{width:16px;height:16px;accent-color:#e8f542;cursor:pointer}
  .setcheck span{font-family:var(--fm);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t2)}
  .exercise.comp-up{border-color:rgba(134,239,172,.35)}.exercise.comp-down{border-color:rgba(253,164,175,.35)}.exercise.comp-eq{border-color:rgba(253,230,138,.35)}
  .finishwrap{margin-top:18px}
  .finishbtn{width:100%;padding:16px;border-radius:14px;border:1px solid rgba(232,245,66,.30);background:linear-gradient(180deg,rgba(232,245,66,.18),rgba(232,245,66,.08));color:var(--text);font-family:var(--fd);font-size:15px;font-weight:800;cursor:pointer}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:76px;background:#101114;border:1px solid var(--b2);color:var(--text);padding:10px 12px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.2s}

  .timerbox{margin:12px 0 14px;padding:14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
  .timerhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
  .timerlabel{font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--acc)}
  .timervalue{font-family:var(--fd);font-size:36px;font-weight:800;line-height:1;color:var(--text)}
  .timerhint{font-size:12px;color:var(--t2);line-height:1.45;margin-top:8px}
  .timeractions{display:flex;gap:8px;flex-wrap:wrap}
  .timerbtn{background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:12px;padding:10px 12px;font:700 12px var(--fd);letter-spacing:.04em;text-transform:uppercase;cursor:pointer}
  .timerbtn.primary{background:var(--acc);color:#0b0c0e;border-color:transparent}
  .timerstatus{font-family:var(--fm);font-size:10px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
  .finish-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(11,12,14,.82);backdrop-filter:blur(8px);z-index:9999;opacity:0;pointer-events:none;transition:opacity .28s ease}
  .finish-overlay.show{opacity:1;pointer-events:all}
  .finish-card{background:var(--s1);border:1px solid var(--b1);border-radius:22px;padding:32px;text-align:center;max-width:300px}
  .finish-check{font-size:3rem;margin-bottom:12px;animation:finishPulse .5s ease both}
  .finish-title{font-family:var(--fd);font-size:1.2rem;font-weight:900;color:#f3f4f6;margin-bottom:6px}
  .finish-sub{font-size:.92rem;color:#a1a1aa}
  @keyframes finishPulse{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1)}}
  @media(max-width:600px){.title{font-size:34px}.metrics,.log,.setfields{grid-template-columns:1fr}}
</style>
</head>

    const comp=completedExercises(), pct=comp.total?Math.round(comp.done/comp.total*100):0, ds=Object.keys(SESSIONS).filter(sessionDone).length, ts=Object.keys(SESSIONS).length;
    const volRows = VOL_AUTO.length ? VOL_AUTO : VOL_MANUAL;
    document.getElementById('coach').innerHTML='<div class="stats"><div class="stitle">Painel do coach</div><div class="statsrow"><div class="stat"><div class="snum">'+ds+'/'+ts+'</div><div class="slab">sessões concluídas</div></div><div class="stat"><div class="snum">'+comp.done+'/'+comp.total+'</div><div class="slab">exercícios concluídos</div></div><div class="stat"><div class="snum">'+pct+'%</div><div class="slab">progresso semanal</div></div></div></div><div class="stats" style="margin-top:10px"><div class="stitle">Volume semanal (ponderado por técnica)</div>'+volRows.map(v=>'<div class="vr"><div>'+v[0]+'</div><div class="vnum">'+v[1]+'</div></div>').join('')+'</div>'+(VOL_MANUAL.length?'<div class="stats" style="margin-top:10px"><div class="stitle">Referência manual do coach</div>'+VOL_MANUAL.map(v=>'<div class="vr"><div>'+v[0]+'</div><div class="vnum">'+v[1]+'</div></div>').join('')+'</div>':'');

    document.getElementById('tecnicas').innerHTML='<div class="tech"><div class="stitle">Técnicas de treino</div></div>'+TECHS.map(t=>'<div class="tech techcard" data-tech-card style="margin-top:10px"><div class="techname"><span>'+t.name+'</span><div style="display:flex;gap:8px;align-items:center"><span class="pill '+t.cls+'">'+t.name+'</span><span class="tech-mul">'+t.mul+'</span></div></div><div class="techdesc">'+t.desc+'</div><div class="techtip">Clique para entender melhor</div><div class="techmore"><div class="techdesc">'+t.more+'</div></div></div>').join('');
    document.querySelectorAll('[data-tech-card]').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('open')));

    document.getElementById('historico').innerHTML='<div class="stats"><div class="stitle">Histórico de treinos</div><p style="font-size:12px;color:var(--t2);margin-top:6px">O histórico aparece após finalizar sessões e registrar cargas.</p></div>';

    document.querySelectorAll('input[data-s],textarea[data-s]').forEach(el=>{
      el.addEventListener('input',()=>{ const s=el.dataset.s,e=el.dataset.e,k=el.dataset.k; const log=getLog(s,e); if(el.type==='checkbox') log[k]=el.checked; else log[k]=el.value; if(k.includes('set')&&k.includes('_done')){ const sc=setCountFromExercise(SESSIONS[s].exercises.find(ex=>ex.key===e)); log.done=areAllSetsChecked(log,sc); } saveState(true); });
    });
    document.querySelectorAll('input[type="checkbox"][data-s]').forEach(el=>{
      el.addEventListener('change',()=>{ const s=el.dataset.s,e=el.dataset.e,k=el.dataset.k; const log=getLog(s,e); log[k]=el.checked; if(k==='done'||k.includes('_done')){ if(!k.includes('_done')) log.done=el.checked; } saveState(true); renderAll(); });
    });
    document.querySelectorAll('[data-timer-start]').forEach(b=>b.addEventListener('click',()=>startSessionTimer(b.dataset.timerStart)));
    document.querySelectorAll('[data-timer-pause]').forEach(b=>b.addEventListener('click',()=>pauseSessionTimer(b.dataset.timerPause)));
    document.querySelectorAll('[data-timer-reset]').forEach(b=>b.addEventListener('click',()=>resetSessionTimer(b.dataset.timerReset)));
  }

  function showSection(id,save=true){ document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); const sec=document.getElementById(id); if(sec) sec.classList.add('active'); const btn=document.querySelector('.nav button[data-target="'+id+'"]'); if(btn) btn.classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); if(save) saveState(true); }

  function pushHistory(sk,exKey){ const log=getLog(sk,exKey); const ex=SESSIONS[sk].exercises.find(item=>item.key===exKey); const sc=ex?setCountFromExercise(ex):1; const eLoad=ex?currentLoadValue(ex,log):(log.load||''); const eReps=totalPerformedReps(log,sc); const eRir=averagePerformedRir(log,sc); if(!eLoad&&!eReps&&!eRir&&!log.notes) return; log.load=eLoad||''; log.reps=eReps||''; log.rir=eRir||''; log.history||=[]; const entry={date:new Date().toLocaleDateString('pt-BR'),load:eLoad||'',reps:eReps||'',rir:eRir||'',effort:log.effort||'',notes:log.notes||'',set1_load:log.set1_load||'',set1_reps:log.set1_reps||'',set1_rir:log.set1_rir||'',set2_load:log.set2_load||'',set2_reps:log.set2_reps||'',set2_rir:log.set2_rir||'',set3_load:log.set3_load||'',set3_reps:log.set3_reps||'',set3_rir:log.set3_rir||'',set4_load:log.set4_load||'',set4_reps:log.set4_reps||'',set4_rir:log.set4_rir||''}; const first=log.history[0]; if(first&&sameEntry(entry,first)) return; log.history.unshift(entry); log.history=log.history.slice(0,5); }

  function finishSession(sk){ const session=SESSIONS[sk]; if(!session) return; session.exercises.forEach(ex=>pushHistory(sk,ex.key)); const t=getTimer(sk); t.lastFinishedMs=currentElapsedMs(sk); t.elapsedMs=0; t.startedAt=null; t.isRunning=false; session.exercises.forEach(ex=>{const log=getLog(sk,ex.key); log.done=false; for(let i=1;i<=4;i++) log['set'+i+'_done']=false;}); saveState(true); renderAll(); const overlay=document.getElementById('finishOverlay'); if(overlay){overlay.classList.add('show'); setTimeout(()=>{overlay.classList.remove('show'); showSection('inicio',false);},1100);} showToast('Sessão finalizada ✅ · '+formatTimer(t.lastFinishedMs)); }

  function buildSummary(){ const parts=['Resumo do treino — '+APP.athlete,'Semana: '+APP.week,'']; Object.entries(SESSIONS).forEach(([k,s])=>{ parts.push(s.title); s.exercises.forEach(ex=>{ const log=getLog(k,ex.key); const sc=setCountFromExercise(ex); const setsTxt=Array.from({length:sc},(_,i)=>i+1).map(n=>'S'+n+': '+(log['set'+n+'_load']||'-')+'kg/'+(log['set'+n+'_reps']||'-')+' reps/RIR '+(log['set'+n+'_rir']||'-')).join(' | '); if(log.load||log.reps||log.notes||log.done) parts.push('- '+ex.name+': '+setsTxt+' | '+(log.done?'concluído':'pendente')+(log.notes?' | '+log.notes:'')); }); parts.push(''); }); return parts.join('\n'); }

  document.getElementById('reportBtn').onclick=async()=>{ try{ await navigator.clipboard.writeText(buildSummary()); showToast('Resumo copiado.'); }catch(e){ showToast('Não deu para copiar automaticamente.'); } };

  loadState();
  renderAll();
  clearInterval(window._sessionTimerInterval);
  window._sessionTimerInterval=setInterval(updateTimerUI,1000);
</script>
</body>
</html>
